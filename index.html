<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>The Covenant</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div id="game-container"></div>

		<!-- UI Overlay -->
		<div id="ui-layer">
			<div id="stats-panel">
				<div id="timer-display">Time: 00:00</div>
				<div id="kill-display">Kills: 0</div>
				<div style="margin-top: 5px; font-size: 12px; color: #aaa">Press ESC to Pause</div>
			</div>

			<!-- Detailed Stats -->
			<div id="stats-details">
				<!-- Populated by JS -->
			</div>

			<!-- Inventory -->
			<div id="inventory-container"></div>

			<div id="xp-bar-container">
				<div class="bar-label">XP</div>
				<div id="xp-bar-fill"></div>
			</div>
			<div id="level-indicator">LVL 1</div>

			<div id="hp-bar-container">
				<div class="bar-label">HEALTH</div>
				<div id="hp-bar-fill"></div>
			</div>
		</div>

		<!-- Level Up Screen -->
		<div id="upgrade-modal">
			<h1 class="text-4xl text-white font-bold mb-6 tracking-wider" style="text-shadow: 0 0 10px #ffd700">CHOOSE UPGRADE</h1>
			<div id="cards-container"></div>
		</div>

		<!-- Pause Screen -->
		<div id="pause-modal">
			<h1 class="text-6xl text-white font-bold mb-14 tracking-widest">PAUSED</h1>
			<p class="text-gray-300 mb-8">Press ESC to Resume</p>
		</div>

		<!-- Start Screen -->
		<div id="start-modal">
			<div id="start-content">
				<h1 class="text-6xl text-white font-bold mb-4 tracking-widest">THE COVENANT</h1>
				<p class="text-gray-300 mb-24 text-base italic tracking-widest">A Story of Memory, Love, and the Long Silence</p>
				<button type="button" id="start-btn" class="text-gray-300 bg-gray-800 hover:bg-gray-700 px-4 py-2 -skew-x-12">INITIALIZE SYSTEMS</button>
			</div>
		</div>

		<!-- Game Over Screen -->
		<div id="game-over-modal">
			<h1 class="text-6xl text-red-500 font-bold mb-4">YOU DIED</h1>
			<p id="final-stats" class="text-xl text-white mb-8">Survived: 00:00</p>
			<button onclick="location.reload()" class="px-8 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded shadow-lg transition">TRY AGAIN</button>
		</div>

		<!-- Story Modal -->
		<div id="story-modal">
			<div id="story-box">
				<div id="story-part-label"></div>
				<h2 id="story-title"></h2>
				<div id="story-scroll-area">
					<div id="story-text"></div>
				</div>
				<div id="story-hint">[ click or enter to skip ]</div>
				<div id="story-buttons">
					<button type="button" id="story-continue-btn">[ CONTINUE ]</button>
					<button type="button" id="story-accept-btn">[ COME HOME ]</button>
					<button type="button" id="story-reject-btn">[ FIGHT FOREVER ]</button>
				</div>
			</div>
		</div>

		<!-- Ending Modal -->
		<div id="ending-modal">
			<div id="ending-label">F I N A L</div>
			<p id="ending-quote"></p>
			<button onclick="location.reload()" id="ending-btn">[ BEGIN AGAIN ]</button>
		</div>

		<script src="game.js"></script>
		<script>
			alert(
				"This alert is not part of the game. It is to simply inform that this game was made for IST 130 final project by Himanshu Sultania. In case of bug, reload the game. Sounds are kept to a minimal to make it playable at night. WASD to move, play for atleast 15 minutes. Enjoy!",
			);
		</script>
	</body>
</html>
